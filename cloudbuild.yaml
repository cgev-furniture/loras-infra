# =============================================================================
# LORAS Furniture — Cloud Build pipeline
# =============================================================================
# Triggered on push to main branch (configure in Cloud Build console).
#
# Substitution variables — set these in the Cloud Build trigger configuration:
#   _REGION            e.g. europe-west1
#   _PROJECT_ID        e.g. loras-prod
#   _BACKEND_URL       e.g. https://loras-backend-xyz-ew.a.run.app
#   _FRONTEND_URL      e.g. https://loras-frontend-xyz-ew.a.run.app
#   _AR_REPO           e.g. europe-west1-docker.pkg.dev/loras-prod/loras
#   _CLOUD_SQL_INSTANCE e.g. loras-prod:europe-west1:loras-pg
#   _DB_NAME           e.g. loras
#   _DB_USER           e.g. loras
#   _SERVICE_ACCOUNT   e.g. loras-backend@loras-prod.iam.gserviceaccount.com
#
# Secrets referenced via --set-secrets must exist in Secret Manager:
#   loras-db-password
#   loras-jwt-secret
#   loras-mail-password
#   loras-mail-username
# =============================================================================

substitutions:
  _REGION:             europe-west1
  _PROJECT_ID:         loras-prod
  _BACKEND_URL:        https://loras-backend-replace-me.a.run.app
  _FRONTEND_URL:       https://loras-frontend-replace-me.a.run.app
  _AR_REPO:            europe-west1-docker.pkg.dev/loras-prod/loras
  _CLOUD_SQL_INSTANCE: loras-prod:europe-west1:loras-pg
  _DB_NAME:            loras
  _DB_USER:            loras
  _SERVICE_ACCOUNT:    loras-backend@loras-prod.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:

  # ---------------------------------------------------------------------------
  # Step 1 — Build & push backend Docker image
  # ---------------------------------------------------------------------------
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=$_AR_REPO/loras-backend:$COMMIT_SHA
      - --tag=$_AR_REPO/loras-backend:latest
      - --cache-from=$_AR_REPO/loras-backend:latest
      - --file=backend/Dockerfile
      - backend
    waitFor: ['-']   # start immediately

  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_AR_REPO/loras-backend
    waitFor: [build-backend]

  # ---------------------------------------------------------------------------
  # Step 2 — Build & push frontend Docker image
  # The VITE_API_BASE_URL build arg embeds the backend URL into the JS bundle.
  # ---------------------------------------------------------------------------
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=$_AR_REPO/loras-frontend:$COMMIT_SHA
      - --tag=$_AR_REPO/loras-frontend:latest
      - --cache-from=$_AR_REPO/loras-frontend:latest
      - --build-arg=VITE_API_BASE_URL=$_BACKEND_URL
      - --file=frontend/Dockerfile
      - frontend
    waitFor: ['-']   # can run in parallel with backend build

  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_AR_REPO/loras-frontend
    waitFor: [build-frontend]

  # ---------------------------------------------------------------------------
  # Step 3 — Run Flyway migrations
  # We start the backend container in non-web mode so it only runs Flyway
  # migrations and then exits cleanly.  The DB password is fetched from
  # Secret Manager at build time via the secretEnv mechanism.
  # ---------------------------------------------------------------------------
  - id: migrate-db
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker run --rm \
          --network=cloudbuild \
          -e DB_URL="jdbc:postgresql:///${_DB_NAME}?cloudSqlInstance=${_CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory" \
          -e DB_USERNAME="${_DB_USER}" \
          -e DB_PASSWORD="$$DB_PASSWORD" \
          -e SPRING_FLYWAY_ENABLED="true" \
          -e SPRING_MAIN_WEB_APPLICATION_TYPE="none" \
          -e GCS_BUCKET_NAME="placeholder" \
          -e JWT_SECRET="placeholder" \
          -e JWT_COOKIE_DOMAIN="placeholder" \
          -e MAIL_HOST="smtp.gmail.com" \
          -e MAIL_PORT="587" \
          -e MAIL_USERNAME="placeholder" \
          -e MAIL_PASSWORD="placeholder" \
          -e CONTACT_EMAIL="placeholder" \
          -e ALLOWED_ORIGINS="placeholder" \
          $_AR_REPO/loras-backend:$COMMIT_SHA
    secretEnv: ['DB_PASSWORD']
    waitFor: [push-backend]

  # ---------------------------------------------------------------------------
  # Step 4 — Deploy backend to Cloud Run
  # ---------------------------------------------------------------------------
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - loras-backend
      - --image=$_AR_REPO/loras-backend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --memory=1Gi
      - --cpu=1
      - --concurrency=20
      - --min-instances=1
      - --max-instances=5
      - --port=8080
      - --set-env-vars=DB_URL=jdbc:postgresql:///${_DB_NAME}?cloudSqlInstance=${_CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory,DB_USERNAME=${_DB_USER},GCS_BUCKET_NAME=loras-media,JWT_COOKIE_DOMAIN=${_FRONTEND_URL},MAIL_HOST=smtp.gmail.com,MAIL_PORT=587,CONTACT_EMAIL=asryantigran@gmail.com,ALLOWED_ORIGINS=${_FRONTEND_URL}
      - --set-secrets=DB_PASSWORD=loras-db-password:latest,JWT_SECRET=loras-jwt-secret:latest,MAIL_PASSWORD=loras-mail-password:latest,MAIL_USERNAME=loras-mail-username:latest
      - --add-cloudsql-instances=$_CLOUD_SQL_INSTANCE
      - --service-account=$_SERVICE_ACCOUNT
      - --allow-unauthenticated
    waitFor: [migrate-db]

  # ---------------------------------------------------------------------------
  # Step 5 — Deploy frontend to Cloud Run
  # ---------------------------------------------------------------------------
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - loras-frontend
      - --image=$_AR_REPO/loras-frontend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --memory=256Mi
      - --cpu=1
      - --concurrency=80
      - --min-instances=0
      - --max-instances=3
      - --port=80
      - --set-env-vars=BACKEND_URL=$_BACKEND_URL
      - --allow-unauthenticated
    waitFor: [push-frontend, deploy-backend]

# ---------------------------------------------------------------------------
# Secret Manager bindings (used in migrate-db step via secretEnv)
# ---------------------------------------------------------------------------
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/loras-db-password/versions/latest
      env: DB_PASSWORD

images:
  - $_AR_REPO/loras-backend:$COMMIT_SHA
  - $_AR_REPO/loras-backend:latest
  - $_AR_REPO/loras-frontend:$COMMIT_SHA
  - $_AR_REPO/loras-frontend:latest
