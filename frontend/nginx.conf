# nginx configuration for LORAS Furniture frontend
# Handles SPA routing, /api proxy, security headers, and asset caching.
#
# At runtime the BACKEND_URL environment variable is substituted into this
# file by the container entrypoint using `envsubst`.  The Docker image copies
# this file to /etc/nginx/templates/default.conf.template so that the official
# nginx image's /docker-entrypoint.d/20-envsubst-on-templates.sh does the
# substitution automatically before nginx starts.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------------
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://storage.googleapis.com; connect-src 'self' https://*.googleapis.com" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ----------------------------------------------------------------
    # Static file: robots.txt
    # ----------------------------------------------------------------
    location = /robots.txt {
        add_header Content-Type text/plain;
        # Security headers must be re-declared inside location blocks that
        # override the parent (nginx does not inherit add_header from parent
        # when a child block also calls add_header).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://storage.googleapis.com; connect-src 'self' https://*.googleapis.com" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ----------------------------------------------------------------
    # Vite build output — hashed filenames, immutable forever
    # ----------------------------------------------------------------
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://storage.googleapis.com; connect-src 'self' https://*.googleapis.com" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ----------------------------------------------------------------
    # i18n locale files — must not be cached (content changes on deploy)
    # ----------------------------------------------------------------
    location /locales/ {
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://storage.googleapis.com; connect-src 'self' https://*.googleapis.com" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ----------------------------------------------------------------
    # Proxy /api/* → Spring Boot backend
    # BACKEND_URL is injected at container start via envsubst
    # e.g. BACKEND_URL=http://loras-backend:8080
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow httpOnly cookies to flow through
        proxy_pass_header Set-Cookie;

        # Generous timeouts for long-running backend operations
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ----------------------------------------------------------------
    # index.html — no-cache so the browser always fetches the latest
    # shell and picks up new hashed asset references
    # ----------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://storage.googleapis.com; connect-src 'self' https://*.googleapis.com" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ----------------------------------------------------------------
    # SPA catch-all — serve index.html for all non-file, non-api routes
    # ----------------------------------------------------------------
    location / {
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://storage.googleapis.com; connect-src 'self' https://*.googleapis.com" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------------
    # Error pages
    # ----------------------------------------------------------------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
